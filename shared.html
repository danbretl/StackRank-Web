<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Shared StackRank movie list</title>
    <meta
      name="description"
      content="A read-only StackRank movie list snapshot."
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shared StackRank movie list" />
    <meta
      property="og:description"
      content="A read-only movie ranking snapshot made with StackRank."
    />
    <meta property="og:image" content="https://www.stackrankapp.com/assets/og-preview.png?v=1" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shared StackRank movie list" />
    <meta
      name="twitter:description"
      content="A read-only movie ranking snapshot made with StackRank."
    />
    <meta name="twitter:image" content="https://www.stackrankapp.com/assets/og-preview.png?v=1" />
    <link rel="icon" href="/assets/favicon.ico" sizes="any" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="preconnect" href="https://hrfhakrxsllrqmscxxpb.supabase.co" />
    <link rel="stylesheet" href="/styles.css?v=147" />
  </head>
  <body class="shared-body">
    <main class="shared-page" data-shared-state="loading">
      <header class="shared-hero">
        <a class="shared-brand" href="/movies" aria-label="StackRank movies">StackRank</a>
        <p class="shared-kicker">Read-only movie ranking</p>
        <h1 id="shared-title">Shared ranking</h1>
        <p id="shared-subtitle">
          This is a published snapshot. Future edits stay private until the owner updates the link.
        </p>
        <div class="shared-meta" id="shared-meta" aria-live="polite">Loading shared list...</div>
        <a class="cta shared-cta" href="/movies">Rank your own movies</a>
      </header>

      <section class="shared-content" aria-labelledby="shared-title">
        <div class="shared-status" id="shared-status" role="status">Loading shared list...</div>
        <div class="shared-grid" id="shared-grid"></div>
      </section>
    </main>

    <div class="shared-detail" id="shared-detail" hidden>
      <section
        class="shared-detail__sheet"
        role="dialog"
        aria-modal="true"
        aria-labelledby="shared-detail-title"
        aria-describedby="shared-detail-overview"
      >
        <button class="shared-detail__close" id="shared-detail-close" type="button" aria-label="Close movie details">
          &times;
        </button>
        <header class="shared-detail__hero">
          <div class="shared-detail__poster" id="shared-detail-poster"></div>
          <div class="shared-detail__heading">
            <p class="shared-detail__rank" id="shared-detail-rank"></p>
            <h2 id="shared-detail-title">Movie title</h2>
            <div class="shared-detail__sub" id="shared-detail-sub"></div>
            <div class="shared-detail__genres" id="shared-detail-genres"></div>
          </div>
        </header>
        <p class="shared-detail__overview" id="shared-detail-overview"></p>
        <dl class="shared-detail__meta">
          <div>
            <dt>Directed by</dt>
            <dd id="shared-detail-director">Unknown</dd>
          </div>
          <div>
            <dt>Starring</dt>
            <dd id="shared-detail-cast">Unknown</dd>
          </div>
        </dl>
        <div class="shared-detail__status" id="shared-detail-status" aria-live="polite"></div>
        <a class="detail-action detail-action--primary shared-detail__cta" id="shared-detail-cta" href="/movies">
          Rank this movie
        </a>
      </section>
    </div>

    <script type="module" src="/shared.js?v=5"></script>
  </body>
</html>
