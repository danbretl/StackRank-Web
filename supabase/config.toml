project_id = "hrfhakrxsllrqmscxxpb"

[auth]
# Where users are sent back after a magic link / OAuth round trip. The canonical
# production app lives at /movies. Every origin/path that serves the app must be
# allow-listed here (and in the dashboard for the hosted project).
site_url = "https://www.stackrankapp.com/movies"
additional_redirect_urls = [
  "https://www.stackrankapp.com/",
  "https://stackrankapp.com/movies",
  "https://stackrankapp.com/",
  "https://stackrank-*-danbretl-2590s-projects.vercel.app/**",
  "https://danbretl.github.io/StackRank-Web/",
  "http://localhost:8000/movies",
  "http://localhost:8000/",
  "http://localhost:3000/movies",
  "http://localhost:3000/",
  "http://192.168.4.31:8000/movies",
  "http://192.168.4.31:8000/",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true
# We send via Resend SMTP; the magic link is the primary, passwordless flow.
secure_password_change = true

[auth.email.template.magic_link]
subject = "Your StackRank sign-in link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.confirmation]
subject = "Confirm your StackRank email"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your StackRank password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.email_change]
subject = "Confirm your new StackRank email"
content_path = "./supabase/templates/email_change.html"

# OAuth providers. Secrets are NEVER committed — they are read from the
# environment (set them locally in supabase/.env for `supabase start`, and in
# the Supabase dashboard for the hosted project). See
# notes/feature-ideas/auth-upgrade.md for the provider-console setup.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"

[auth.external.apple]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_APPLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)"

[functions.tmdb-search]
verify_jwt = false

[functions.tmdb-suggest]
verify_jwt = false

[functions.tmdb-detail]
verify_jwt = false

[functions.tmdb-image]
verify_jwt = false

[functions.tonight-pick]
verify_jwt = false
